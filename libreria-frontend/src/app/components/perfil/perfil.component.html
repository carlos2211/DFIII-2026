<div class="perfil-wrapper">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="perfil-card">
          <div class="perfil-header">
            <div class="avatar">{{ usuario?.nombre?.charAt(0)?.toUpperCase() }}</div>
            <h3>{{ usuario?.nombre }}</h3>
            <span class="badge-rol" [ngClass]="usuario?.rol?.toLowerCase()">{{ usuario?.rol }}</span>
          </div>

          <div class="alert alert-success" *ngIf="exito">✅ Perfil actualizado correctamente.</div>
          <div class="alert alert-danger"  *ngIf="error">{{ error }}</div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Nombre completo *</label>
                <input type="text" class="form-control" formControlName="nombre"
                       [ngClass]="{'is-invalid': f['nombre'].touched && f['nombre'].invalid}">
                <div class="invalid-feedback">
                  <span *ngIf="f['nombre'].errors?.['required']">Requerido.</span>
                  <span *ngIf="f['nombre'].errors?.['minlength']">Mínimo 3 caracteres.</span>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label">Correo electrónico *</label>
                <input type="email" class="form-control" formControlName="email"
                       [ngClass]="{'is-invalid': f['email'].touched && f['email'].invalid}">
                <div class="invalid-feedback">
                  <span *ngIf="f['email'].errors?.['required']">Requerido.</span>
                  <span *ngIf="f['email'].errors?.['email']">Correo inválido.</span>
                </div>
              </div>

              <div class="col-12 col-sm-6">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control" formControlName="telefono"
                       placeholder="+56912345678"
                       [ngClass]="{'is-invalid': f['telefono'].touched && f['telefono'].invalid}">
                <div class="invalid-feedback">Formato inválido.</div>
              </div>

              <div class="col-12 col-sm-6">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" formControlName="direccion"
                       placeholder="Tu dirección">
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-guardar mt-4">
              💾 Guardar cambios
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
