<div class="recuperar-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh">
      <div class="col-12 col-sm-10 col-md-6 col-lg-5">
        <div class="recuperar-card">

          <div class="text-center mb-4">
            <div class="icon-lock">🔑</div>
            <h2>Recuperar contraseña</h2>
            <p class="text-muted">Te enviaremos instrucciones a tu correo</p>
          </div>

          <div class="alert alert-success" *ngIf="enviado">
            📧 Si el correo existe, recibirás un enlace de recuperación en tu bandeja.
            <br><a routerLink="/login" class="link-volver">← Volver al login</a>
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!enviado" novalidate>
            <div class="mb-4">
              <label class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" formControlName="email"
                     placeholder="tu@correo.cl"
                     [ngClass]="{'is-invalid': f['email'].touched && f['email'].invalid}">
              <div class="invalid-feedback">
                <span *ngIf="f['email'].errors?.['required']">El correo es requerido.</span>
                <span *ngIf="f['email'].errors?.['email']">Ingresa un correo válido.</span>
              </div>
            </div>

            <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>

            <button type="submit" class="btn btn-primary w-100 btn-recuperar">
              Enviar instrucciones
            </button>
          </form>

          <div class="text-center mt-3">
            <a routerLink="/login" class="link-volver">← Volver al login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
